name: CI / Build Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify:
    name: Verify & Compile C# Launcher
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Verify PowerShell Scripts Syntax
      shell: powershell
      run: |
        Write-Host "Verifying start-stream.ps1 syntax..."
        Get-Command -ErrorAction SilentlyContinue -Name .\start-stream.ps1
        Write-Host "Verifying start-ngrok-stream.ps1 syntax..."
        Get-Command -ErrorAction SilentlyContinue -Name .\start-ngrok-stream.ps1

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Compile Launcher Check
      shell: powershell
      run: |
        # Cria um arquivo temporário logo.png para simular os assets e evitar falhas de compilação por falta do arquivo
        if (-not (Test-Path "logo.png")) {
            New-Item -ItemType File -Path "logo.png" -Force
        }
        
        # Executa o compilador
        .\compile-launcher.ps1
        
        # Verifica se o binário compilado (.exe) foi gerado com sucesso no Runner do Windows
        if (Test-Path "DJI-Stream-Hub.exe") {
            Write-Host "✔ Sucesso: O executável DJI-Stream-Hub.exe foi compilado com sucesso!"
        } else {
            Write-Error "✖ Erro: Falha ao compilar o executável do Launcher!"
            exit 1
        }
