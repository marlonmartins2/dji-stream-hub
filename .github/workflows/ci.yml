name: CI / Build Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify:
    name: Verify & Compile C# Launcher
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Verify PowerShell Scripts Syntax
      shell: powershell
      run: |
        Write-Host "Verifying start-stream.ps1 syntax..."
        Get-Command -ErrorAction SilentlyContinue -Name .\start-stream.ps1
        Write-Host "Verifying start-ngrok-stream.ps1 syntax..."
        Get-Command -ErrorAction SilentlyContinue -Name .\start-ngrok-stream.ps1

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Compile Launcher Check
      shell: powershell
      run: |
        # Create a mock logo.png file to avoid compilation errors due to missing assets
        if (-not (Test-Path "logo.png")) {
            New-Item -ItemType File -Path "logo.png" -Force
        }
        
        # Execute the compiler script
        .\compile-launcher.ps1
        
        # Verify if the compiled executable was successfully generated
        if (Test-Path "DJI-Stream-Hub.exe") {
            Write-Host "Success: DJI-Stream-Hub.exe was compiled successfully!"
        } else {
            Write-Error "Error: Failed to compile the Launcher executable!"
            exit 1
        }
